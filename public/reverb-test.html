<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverb WebSocket Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .card-header {
            background: linear-gradient(135deg, #f43f5e 0%, #a855f7 100%);
            color: white;
            padding: 24px;
        }
        
        .card-header h1 {
            margin: 0;
            font-size: 24px;
        }
        
        .card-header p {
            margin: 8px 0 0 0;
            opacity: 0.9;
        }
        
        .card-body {
            padding: 24px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-connect {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }
        
        .btn-disconnect {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .btn-disconnect:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
        
        .btn-send {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }
        
        .btn-send:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .btn-clear {
            background: linear-gradient(135deg, #6b7280, #4b5563);
            color: white;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .status-connected {
            background: #10b981;
            color: white;
        }
        
        .status-disconnected {
            background: #ef4444;
            color: white;
        }
        
        .status-connecting {
            background: #f59e0b;
            color: white;
        }
        
        .console {
            background: #1a1625;
            color: #10b981;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 16px;
        }
        
        .console-line {
            margin-bottom: 4px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .console-line:last-child {
            border-bottom: none;
        }
        
        .timestamp {
            color: #6b7280;
            margin-right: 8px;
        }
        
        .log-info { color: #3b82f6; }
        .log-success { color: #10b981; }
        .log-error { color: #ef4444; }
        .log-warning { color: #f59e0b; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-top: 16px;
        }
        
        .stat-box {
            background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
            padding: 16px;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #6b7280;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>🔌 Reverb WebSocket Tester</h1>
                <p>Test your Laravel Reverb server connection</p>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label>Connection URL</label>
                    <input type="text" id="wsUrl" value="ws://localhost:8080/app/dating-app" placeholder="ws://your-domain.com:8080/app/your-app-id">
                </div>
                
                <div class="form-group">
                    <label>Status: <span id="statusBadge" class="status-badge status-disconnected">Disconnected</span></label>
                </div>
                
                <div class="btn-group">
                    <button class="btn-connect" id="connectBtn" onclick="connect()">🚀 Connect</button>
                    <button class="btn-disconnect" id="disconnectBtn" onclick="disconnect()" disabled>🛑 Disconnect</button>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="messagesReceived">0</div>
                        <div class="stat-label">Messages Received</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="messagesSent">0</div>
                        <div class="stat-label">Messages Sent</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="uptime">00:00</div>
                        <div class="stat-label">Uptime</div>
                    </div>
                </div>
                
                <div class="form-group" style="margin-top: 24px;">
                    <label>Send Test Message</label>
                    <input type="text" id="testMessage" placeholder="Enter a test message" value='{"event":"test","data":"Hello Reverb!"}'>
                </div>
                
                <div class="btn-group">
                    <button class="btn-send" id="sendBtn" onclick="sendMessage()" disabled>📤 Send Message</button>
                    <button class="btn-clear" onclick="clearConsole()">🗑️ Clear Console</button>
                </div>
                
                <div class="console" id="console">
                    <div class="console-line log-info">
                        <span class="timestamp">[--:--:--]</span>
                        <span>Console ready. Click "Connect" to start.</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let messagesReceived = 0;
        let messagesSent = 0;
        let connectTime = null;
        let uptimeInterval = null;

        function log(message, type = 'info') {
            const console = document.getElementById('console');
            const timestamp = new Date().toLocaleTimeString();
            const line = document.createElement('div');
            line.className = `console-line log-${type}`;
            line.innerHTML = `<span class="timestamp">[${timestamp}]</span><span>${message}</span>`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        function updateStatus(status, badgeClass) {
            const badge = document.getElementById('statusBadge');
            badge.textContent = status;
            badge.className = `status-badge status-${badgeClass}`;
        }

        function updateStats() {
            document.getElementById('messagesReceived').textContent = messagesReceived;
            document.getElementById('messagesSent').textContent = messagesSent;
        }

        function updateUptime() {
            if (!connectTime) return;
            const diff = Date.now() - connectTime;
            const minutes = Math.floor(diff / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            document.getElementById('uptime').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function connect() {
            const url = document.getElementById('wsUrl').value;
            
            if (!url) {
                log('❌ Please enter a WebSocket URL', 'error');
                return;
            }

            try {
                log(`🔄 Connecting to ${url}...`, 'info');
                updateStatus('Connecting', 'connecting');
                
                ws = new WebSocket(url);

                ws.onopen = () => {
                    log('✅ Connected successfully!', 'success');
                    updateStatus('Connected', 'connected');
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    
                    connectTime = Date.now();
                    uptimeInterval = setInterval(updateUptime, 1000);
                };

                ws.onmessage = (event) => {
                    messagesReceived++;
                    updateStats();
                    log(`📥 Received: ${event.data}`, 'success');
                };

                ws.onerror = (error) => {
                    log(`❌ WebSocket error occurred`, 'error');
                    console.error('WebSocket error:', error);
                };

                ws.onclose = (event) => {
                    log(`🔌 Connection closed (Code: ${event.code}, Reason: ${event.reason || 'None'})`, 'warning');
                    updateStatus('Disconnected', 'disconnected');
                    document.getElementById('connectBtn').disabled = false;
                    document.getElementById('disconnectBtn').disabled = true;
                    document.getElementById('sendBtn').disabled = true;
                    
                    if (uptimeInterval) {
                        clearInterval(uptimeInterval);
                        uptimeInterval = null;
                    }
                    connectTime = null;
                };

            } catch (error) {
                log(`❌ Failed to connect: ${error.message}`, 'error');
                updateStatus('Disconnected', 'disconnected');
            }
        }

        function disconnect() {
            if (ws) {
                log('🛑 Disconnecting...', 'warning');
                ws.close();
                ws = null;
            }
        }

        function sendMessage() {
            const message = document.getElementById('testMessage').value;
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log('❌ Not connected. Please connect first.', 'error');
                return;
            }

            if (!message) {
                log('❌ Please enter a message to send', 'error');
                return;
            }

            try {
                ws.send(message);
                messagesSent++;
                updateStats();
                log(`📤 Sent: ${message}`, 'info');
            } catch (error) {
                log(`❌ Failed to send message: ${error.message}`, 'error');
            }
        }

        function clearConsole() {
            document.getElementById('console').innerHTML = '';
            messagesReceived = 0;
            messagesSent = 0;
            updateStats();
            log('Console cleared', 'info');
        }

        // Allow Enter key to send message
        document.getElementById('testMessage').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Allow Enter key to connect
        document.getElementById('wsUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                connect();
            }
        });

        // Auto-populate from environment if available
        window.addEventListener('DOMContentLoaded', () => {
            // Try to detect production URL
            const hostname = window.location.hostname;
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            
            if (hostname !== 'localhost' && hostname !== '127.0.0.1') {
                document.getElementById('wsUrl').value = `${protocol}//${hostname}:8080/app/dating-app`;
                log(`ℹ️ Auto-detected URL: ${protocol}//${hostname}:8080/app/dating-app`, 'info');
            }
        });
    </script>
</body>
</html>
