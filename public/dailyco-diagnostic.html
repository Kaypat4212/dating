<!DOCTYPE html>
<html>
<head>
    <title>Daily.co Call Diagnostic - Hearts Connect</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #00ff00;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .test-section {
            background: #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            color: #fff;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .test-section h2::before {
            content: "⏳";
            margin-right: 10px;
            font-size: 20px;
        }
        .test-section.success h2::before { content: "✅"; }
        .test-section.error h2::before { content: "❌"; }
        .test-section.warning h2::before { content: "⚠️"; }
        .result {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #00ff00;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .error-text { color: #ff4444; }
        .success-text { color: #00ff88; }
        .warning-text { color: #ffaa00; }
        .info { color: #888; margin-top: 10px; font-size: 13px; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        code {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #00ff88;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📞 Daily.co Call Diagnostic</h1>
        <p class="subtitle">Testing voice/video call configuration...</p>

        <!-- Test 1: SDK Loading -->
        <div class="test-section" id="test-sdk">
            <h2>1. Daily.co SDK Loading</h2>
            <div class="result" id="sdk-result">Testing...</div>
        </div>

        <!-- Test 2: Backend Config -->
        <div class="test-section" id="test-backend">
            <h2>2. Backend Configuration</h2>
            <div class="result" id="backend-result">Testing...</div>
        </div>

        <!-- Test 3: Room Creation -->
        <div class="test-section" id="test-room">
            <h2>3. Test Room Creation</h2>
            <button class="btn" onclick="testRoomCreation()">🧪 Create Test Room</button>
            <div class="result" id="room-result" style="display:none;"></div>
        </div>

        <!-- Test 4: Browser Permissions -->
        <div class="test-section" id="test-permissions">
            <h2>4. Browser Media Permissions</h2>
            <button class="btn" onclick="testPermissions()">🎤 Test Microphone/Camera</button>
            <div class="result" id="permissions-result" style="display:none;"></div>
        </div>

        <!-- Fix Instructions -->
        <div class="test-section" id="fix-instructions" style="display:none;">
            <h2>🔧 How to Fix</h2>
            <div class="result" id="fix-steps"></div>
        </div>
    </div>

    <!-- Load Daily.co SDK -->
    <script src="https://unpkg.com/@daily-co/daily-js"></script>
    
    <script>
        // Test 1: SDK Loading
        setTimeout(() => {
            const sdkSection = document.getElementById('test-sdk');
            const sdkResult = document.getElementById('sdk-result');
            
            if (window.DailyIframe) {
                sdkSection.classList.add('success');
                sdkResult.innerHTML = `
                    <div class="success-text">✅ Daily.co SDK loaded successfully!</div>
                    <div class="info">Version: ${DailyIframe.version || 'Unknown'}</div>
                    <div class="info">CDN: https://unpkg.com/@daily-co/daily-js</div>
                `;
            } else {
                sdkSection.classList.add('error');
                sdkResult.innerHTML = `
                    <div class="error-text">❌ Daily.co SDK failed to load</div>
                    <div class="info">This is why you see "contact support" error</div>
                    <div class="info">Possible causes:</div>
                    <div class="info">• Firewall blocking unpkg.com</div>
                    <div class="info">• Ad blocker blocking the script</div>
                    <div class="info">• Network connection issue</div>
                `;
                showFixInstructions('sdk');
            }
        }, 2000);

        // Test 2: Backend Config
        fetch('/api/dailyco/check')
            .then(r => r.json())
            .then(data => {
                const section = document.getElementById('test-backend');
                const result = document.getElementById('backend-result');
                
                if (data.configured) {
                    section.classList.add('success');
                    result.innerHTML = `
                        <div class="success-text">✅ Backend properly configured</div>
                        <div class="info">API Key: ${data.api_key_set ? 'Set ✅' : 'Missing ❌'}</div>
                        <div class="info">Domain: ${data.domain || 'Not set'}</div>
                    `;
                } else {
                    section.classList.add('error');
                    result.innerHTML = `
                        <div class="error-text">❌ Backend configuration missing</div>
                        <div class="info">${data.error || 'Unknown error'}</div>
                    `;
                    showFixInstructions('backend');
                }
            })
            .catch(err => {
                const section = document.getElementById('test-backend');
                const result = document.getElementById('backend-result');
                section.classList.add('error');
                result.innerHTML = `
                    <div class="error-text">❌ Could not check backend config</div>
                    <div class="info">Error: ${err.message}</div>
                `;
            });

        // Test 3: Room Creation
        function testRoomCreation() {
            const result = document.getElementById('room-result');
            result.style.display = 'block';
            result.innerHTML = '<div class="warning-text">⏳ Creating test room...</div>';
            
            fetch('/api/dailyco/test-room', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    const section = document.getElementById('test-room');
                    if (data.success) {
                        section.classList.add('success');
                        result.innerHTML = `
                            <div class="success-text">✅ Test room created!</div>
                            <div class="info">Room URL: ${data.room_url}</div>
                            <div class="info">This means calls will work properly.</div>
                        `;
                    } else {
                        section.classList.add('error');
                        result.innerHTML = `
                            <div class="error-text">❌ Failed to create room</div>
                            <div class="info">Error: ${data.error || 'Unknown'}</div>
                        `;
                        showFixInstructions('room');
                    }
                })
                .catch(err => {
                    const section = document.getElementById('test-room');
                    section.classList.add('error');
                    result.innerHTML = `
                        <div class="error-text">❌ Room creation failed</div>
                        <div class="info">Error: ${err.message}</div>
                    `;
                });
        }

        // Test 4: Browser Permissions
        async function testPermissions() {
            const result = document.getElementById('permissions-result');
            const section = document.getElementById('test-permissions');
            result.style.display = 'block';
            result.innerHTML = '<div class="warning-text">⏳ Requesting permissions...</div>';
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
                section.classList.add('success');
                result.innerHTML = `
                    <div class="success-text">✅ Microphone and camera access granted!</div>
                    <div class="info">Audio tracks: ${stream.getAudioTracks().length}</div>
                    <div class="info">Video tracks: ${stream.getVideoTracks().length}</div>
                `;
                stream.getTracks().forEach(track => track.stop());
            } catch (err) {
                section.classList.add('error');
                result.innerHTML = `
                    <div class="error-text">❌ Permission denied</div>
                    <div class="info">Error: ${err.message}</div>
                    <div class="info">You need to allow microphone/camera access for calls to work.</div>
                `;
            }
        }

        function showFixInstructions(issue) {
            const fixSection = document.getElementById('fix-instructions');
            const fixSteps = document.getElementById('fix-steps');
            fixSection.style.display = 'block';
            
            let instructions = '';
            
            if (issue === 'sdk') {
                instructions = `
                    <div class="error-text">⚠️ Daily.co SDK not loading</div>
                    <div class="info">Fix steps:</div>
                    <div class="info">1. Check if ad blocker is blocking unpkg.com</div>
                    <div class="info">2. Try disabling browser extensions</div>
                    <div class="info">3. Check if firewall is blocking CDN access</div>
                    <div class="info">4. Try opening this page in incognito mode</div>
                `;
            } else if (issue === 'backend') {
                instructions = `
                    <div class="error-text">⚠️ Daily.co API not configured</div>
                    <div class="info">Fix steps:</div>
                    <div class="info">1. Add to .env file:</div>
                    <div class="info">   <code>DAILY_CO_API_KEY=04ca3d1b4865bfd6d60c10895055b37fb5e00f0cd478a102743bd14e72a44be3</code></div>
                    <div class="info">   <code>DAILY_CO_DOMAIN=your-domain.daily.co</code></div>
                    <div class="info">2. Clear cache: <code>php artisan config:clear</code></div>
                    <div class="info">3. Reload this page</div>
                `;
            } else if (issue === 'room') {
                instructions = `
                    <div class="error-text">⚠️ Cannot create Daily.co rooms</div>
                    <div class="info">This usually means:</div>
                    <div class="info">• API key is invalid</div>
                    <div class="info">• API key doesn't have room creation permissions</div>
                    <div class="info">• Network cannot reach Daily.co servers</div>
                    <div class="info">Check Admin → API Key Tester for more details</div>
                `;
            }
            
            fixSteps.innerHTML = instructions;
        }
    </script>
</body>
</html>
