---
deployment:
  tasks:
    # ── 1. PHP dependencies ─────────────────────────────────────────────────
    # Installs vendor/ which is gitignored — required before any artisan call.
    - composer install --no-dev --optimize-autoloader --no-interaction

    # ── 2. Environment file ──────────────────────────────────────────────────
    # Copy .env.example only if .env is missing (first deploy).
    # On subsequent deploys the existing .env is preserved.
    - test -f .env || cp .env.example .env

    # ── 3. App encryption key ────────────────────────────────────────────────
    # Only generates a key when APP_KEY is still blank (safe on re-deploys).
    - grep -q '^APP_KEY=base64:' .env || php artisan key:generate --force

    # ── 4. Database migrations ───────────────────────────────────────────────
    - php artisan migrate --force

    # ── 5. Clear stale caches then rebuild ─────────────────────────────────
    - php artisan optimize:clear
    - php artisan optimize

    # ── 6. Storage symlink ───────────────────────────────────────────────────
    # The 2>/dev/null suppresses "already exists" errors on re-deploy.
    - php artisan storage:link --force 2>/dev/null; true

    # ── 7. File permissions ──────────────────────────────────────────────────
    # Laravel needs write access to storage/ and bootstrap/cache/.
    - chmod -R 775 storage bootstrap/cache
    - chmod 644 .env
