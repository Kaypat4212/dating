name: Build HeartsConnect APK

on:
  push:
    branches: [ master ]
    paths:
      - 'apk/**'
  workflow_dispatch:   # also allows manual trigger from GitHub Actions tab

jobs:
  build-apk:
    name: Buildozer – Android APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install system dependencies required by Buildozer / NDK ──────
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            python3-pip

      # ── 4. Cache Buildozer's .buildozer directory ─────────────────────
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            apk/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('apk/buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      # ── 5. Install Buildozer & Cython ────────────────────────────────────
      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      # ── 6. Build debug APK ───────────────────────────────────────────────
      - name: Build APK (debug)
        working-directory: apk
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      # ── 7. Upload APK as artifact ────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: heartsconnect-debug-apk
          path: apk/bin/*.apk
          retention-days: 30

      # ── 8. Upload build log so you can diagnose failures ─────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: apk/build.log
          retention-days: 14
