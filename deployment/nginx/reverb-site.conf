# Nginx Configuration for Hearts Connect Dating Platform with Reverb WebSocket
# Location: /etc/nginx/sites-available/heartsconnect
# 
# After editing:
# 1. Update paths and domain names to match your setup
# 2. Test: sudo nginx -t
# 3. Enable: sudo ln -s /etc/nginx/sites-available/heartsconnect /etc/nginx/sites-enabled/
# 4. Reload: sudo systemctl reload nginx

# ═══════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS Redirect
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name heartsconnect.site www.heartsconnect.site;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# ═══════════════════════════════════════════════════════════════════════════
# HTTPS Server with Reverb WebSocket Proxy
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name heartsconnect.site www.heartsconnect.site;

    # ── Document Root ──────────────────────────────────────────────────────
    root /var/www/html/dating/public;
    index index.php index.html index.htm;

    # ── SSL Configuration ──────────────────────────────────────────────────
    # Managed by Let's Encrypt certbot (auto-generated)
    ssl_certificate /etc/letsencrypt/live/heartsconnect.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/heartsconnect.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Additional SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Max Upload Size ────────────────────────────────────────────────────
    client_max_body_size 50M;

    # ══════════════════════════════════════════════════════════════════════
    # Reverb WebSocket Proxy (CRITICAL)
    # ══════════════════════════════════════════════════════════════════════
    location /app {
        # Proxy to local Reverb server (port 8080)
        proxy_pass http://127.0.0.1:8080;
        
        # WebSocket upgrade headers (REQUIRED)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts for long-lived connections
        proxy_read_timeout 86400s;      # 24 hours
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        
        # Buffering (disable for real-time)
        proxy_buffering off;
        
        # Keep-alive
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # ── Laravel Application ────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP Processing ─────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;  # Adjust PHP version if needed
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Increase timeout for long requests
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Static Assets (Cache for 1 year) ──────────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Deny Access to Hidden Files ───────────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny Access to Sensitive Files ────────────────────────────────────
    location ~ /\.(env|git|htaccess|gitignore) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/heartsconnect-access.log;
    error_log /var/log/nginx/heartsconnect-error.log;
}

# ═══════════════════════════════════════════════════════════════════════════
# Rate Limiting (Optional - Uncomment to enable)
# ═══════════════════════════════════════════════════════════════════════════
# Add this OUTSIDE the server block, at the top of the file:
#
# limit_req_zone $binary_remote_addr zone=reverb_limit:10m rate=100r/s;
#
# Then inside the /app location block add:
# limit_req zone=reverb_limit burst=200 nodelay;
