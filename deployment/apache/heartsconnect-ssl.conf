# Apache Configuration for Hearts Connect Dating Platform with Reverb WebSocket
# Location: /etc/apache2/sites-available/heartsconnect-ssl.conf
#
# Prerequisites:
# 1. Enable required modules:
#    sudo a2enmod ssl proxy proxy_http proxy_wstunnel rewrite headers
#
# 2. After editing:
#    sudo apache2ctl configtest
#    sudo a2ensite heartsconnect-ssl
#    sudo systemctl reload apache2

# ═══════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS Redirect
# ═══════════════════════════════════════════════════════════════════════════
<VirtualHost *:80>
    ServerName heartsconnect.site
    ServerAlias www.heartsconnect.site
    
    # Redirect all HTTP to HTTPS
    Redirect permanent / https://heartsconnect.site/
</VirtualHost>

# ═══════════════════════════════════════════════════════════════════════════
# HTTPS Server with Reverb WebSocket Proxy
# ═══════════════════════════════════════════════════════════════════════════
<VirtualHost *:443>
    ServerName heartsconnect.site
    ServerAlias www.heartsconnect.site
    ServerAdmin admin@heartsconnect.site

    # ── Document Root ──────────────────────────────────────────────────────
    DocumentRoot /var/www/html/dating/public

    # ── SSL Configuration ──────────────────────────────────────────────────
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/heartsconnect.site/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/heartsconnect.site/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # SSL Protocols and Ciphers (Security hardening)
    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on

    # ══════════════════════════════════════════════════════════════════════
    # Reverb WebSocket Proxy (CRITICAL)
    # ══════════════════════════════════════════════════════════════════════
    
    # Preserve Host header
    ProxyPreserveHost On
    
    # WebSocket proxy rules
    ProxyPass /app ws://127.0.0.1:8080/app retry=0 timeout=300 keepalive=On
    ProxyPassReverse /app ws://127.0.0.1:8080/app
    
    # Alternative for secure WebSocket (wss://)
    # ProxyPass /app ws://127.0.0.1:8080/app retry=0 timeout=300
    # ProxyPassReverse /app wss://heartsconnect.site/app

    # WebSocket headers
    <Location /app>
        # Allow WebSocket upgrades
        RewriteEngine On
        RewriteCond %{HTTP:Upgrade} =websocket [NC]
        RewriteRule /(.*)           ws://127.0.0.1:8080/$1 [P,L]
        RewriteCond %{HTTP:Upgrade} !=websocket [NC]
        RewriteRule /(.*)           http://127.0.0.1:8080/$1 [P,L]
        
        # Proxy timeout settings
        ProxyPass ws://127.0.0.1:8080/app timeout=86400 keepalive=On
        ProxyPassReverse ws://127.0.0.1:8080/app
        
        # Set headers
        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Port "443"
    </Location>

    # ── Laravel Application Directory ──────────────────────────────────────
    <Directory /var/www/html/dating/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Enable .htaccess
        <IfModule mod_rewrite.c>
            RewriteEngine On
            
            # Redirect to HTTPS if not already
            RewriteCond %{HTTPS} off
            RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]
        </IfModule>
    </Directory>

    # ── Security Headers ───────────────────────────────────────────────────
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ── Deny Access to Hidden Files ───────────────────────────────────────
    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    # ── Deny Access to Sensitive Files ────────────────────────────────────
    <FilesMatch "\.(env|git|htaccess|gitignore)$">
        Require all denied
    </FilesMatch>

    # ── Cache Static Assets ────────────────────────────────────────────────
    <FilesMatch "\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "max-age=31536000, public, immutable"
    </FilesMatch>

    # ── Max Upload Size ────────────────────────────────────────────────────
    LimitRequestBody 52428800  # 50MB

    # ── Logging ────────────────────────────────────────────────────────────
    ErrorLog ${APACHE_LOG_DIR}/heartsconnect-error.log
    CustomLog ${APACHE_LOG_DIR}/heartsconnect-access.log combined
    
    # Detailed logging for debugging (comment out in production)
    # LogLevel info ssl:warn proxy:debug proxy_wstunnel:debug
</VirtualHost>

# ═══════════════════════════════════════════════════════════════════════════
# Additional Apache Configuration
# ═══════════════════════════════════════════════════════════════════════════

# Enable compression
<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
</IfModule>

# Browser caching
<IfModule mod_expires.c>
    ExpiresActive On
    ExpiresByType image/jpg "access plus 1 year"
    ExpiresByType image/jpeg "access plus 1 year"
    ExpiresByType image/gif "access plus 1 year"
    ExpiresByType image/png "access plus 1 year"
    ExpiresByType image/svg+xml "access plus 1 year"
    ExpiresByType text/css "access plus 1 month"
    ExpiresByType application/javascript "access plus 1 month"
    ExpiresByType application/x-javascript "access plus 1 month"
    ExpiresByType text/javascript "access plus 1 month"
</IfModule>
